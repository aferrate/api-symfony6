language: php

php:
  - 8.1

services:
  - docker

before_install:
  - cd laradock
  - docker-compose up -d nginx mysql phpmyadmin redis elasticsearch
  - docker-compose --file ./docker-compose.yml exec workspace composer install
  - docker-compose --file ./docker-compose.yml exec workspace php bin/console doctrine:database:create
  - docker-compose --file ./docker-compose.yml exec workspace php bin/console doctrine:migrations:migrate
  - docker-compose --file ./docker-compose.yml exec workspace php bin/console app:create-elasticsearch-cars-index
  - docker-compose --file ./docker-compose.yml exec workspace php bin/console app:create-elasticsearch-users-index
  - docker-compose --file ./docker-compose.yml exec workspace php bin/console doctrine:fixtures:load

script:
  - docker-compose --file ./docker-compose.yml exec workspace ./vendor/bin/phpunit